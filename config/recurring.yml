# Schedule de jobs recurrentes ejecutados por bin/jobs (SolidQueue scheduler).
#
# Mikhael corre como server privado en local — en dev encolamos el polling
# de Telegram igual que en producción, así "bin/dev" arranca todo de una.
#
# Si NO querés correr el bot en dev, simplemente no setees TELEGRAM_BOT_TOKEN
# en tu .env — el job hace early return.

default: &default
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  telegram_poll:
    class: TelegramPollJob
    schedule: every 2 seconds

development:
  <<: *default

production:
  <<: *default
